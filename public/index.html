<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-store" />
<title>Manager Orchestrator</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{--ink:#16263a;--blue:#1f5fae;--bg:#f6f8fb;--card:#fff;--muted:#5b6b7d;--line:#e3e9f0;--green:#2e9e5b;--purple:#7a4fd0}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6}
  .wrap{max-width:860px;margin:0 auto;padding:18px}
  header{background:linear-gradient(135deg,#16263a,#7a4fd0);color:#fff;padding:22px 18px}
  header h1{font-size:22px;font-weight:900}
  header p{opacity:.9;font-size:13px;margin-top:4px}
  .badge{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);padding:3px 10px;border-radius:999px;font-size:11px;margin-top:8px;margin-right:6px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:14px}
  textarea{width:100%;min-height:60px;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:15px;font-family:inherit;resize:vertical}
  .examples{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:#eef3fa;color:var(--blue);border:1px solid #d6e2f5;border-radius:999px;padding:5px 11px;font-size:12px;cursor:pointer}
  button.go{margin-top:10px;background:var(--purple);color:#fff;font-weight:800;border:none;border-radius:10px;padding:12px 20px;font-size:15px;cursor:pointer}
  .trace{font-family:ui-monospace,Menlo,monospace;font-size:13px}
  .step{border-left:3px solid var(--line);padding:6px 10px;margin:6px 0;background:#fafcff;border-radius:0 8px 8px 0}
  .step.think{border-color:var(--purple)} .step.delegate{border-color:var(--blue)} .step.done{border-color:var(--amber,#b8860b)}
  .step b{font-size:11px;text-transform:uppercase;color:var(--muted)}
  .agents{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
  .a{background:#fafcff;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:12px}
  .a b{color:var(--blue)}
  h3{font-size:14px;color:var(--muted);margin:14px 0 4px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
function App(){
  const [req,setReq]=useState('');
  const [trace,setTrace]=useState([]);
  const [target,setTarget]=useState('');
  const [busy,setBusy]=useState(false);
  const ex=['トナーが薄い複合機を確認して','患者の受付をQRで行って','今月のチケットを要約してメール送信','プリンターがオフラインです','待合せが混雑しているので通知して'];
  async function run(r){ if(!r.trim())return; setBusy(true); setTrace([]); setTarget('');
    try{
      const res=await fetch('/api/orchestrate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({request:r})});
      const d=await res.json(); setTarget(d.target);
      for(const s of d.steps){ setTrace(prev=>[...prev,s]); await new Promise(res=>setTimeout(res,300)); }
    }catch(e){ setTrace([{step:'error',result:e.message}]); }
    setBusy(false);
  }
  return (
    <div>
      <header><div className="wrap" style={{padding:0}}>
        <h1>🎯 Manager Orchestrator</h1>
        <p>1つの指示を専門エージェント（バックオフィス・病院）に自動振り分け</p>
        <span className="badge">マルチエージェント</span><span className="badge">自動ルーティング</span>
      </div></header>
      <div className="wrap">
        <div className="card">
          <h3 style={{marginTop:0}}>経営陣からの指示（日本語OK）</h3>
          <textarea value={req} onChange={e=>setReq(e.target.value)} placeholder="例：トナーが薄い複合機を確認して"></textarea>
          <div className="examples">{ex.map((e,i)=><span key={i} className="chip" onClick={()=>{setReq(e);run(e);}}>{e}</span>)}</div>
          <button className="go" disabled={busy} onClick={()=>run(req)}>{busy?'実行中…':'実行 ▶'}</button>
          {target&&<div style={{marginTop:10,fontWeight:800,color:'var(--purple)'}}>→ ルーティング先: {target}</div>}
        </div>
        {trace.length>0&&<div className="card"><h3 style={{marginTop:0}}>オーケストレーション</h3>
          <div className="trace">{trace.map((s,i)=><div key={i} className={'step '+s.step}><b>{s.step}</b><div>{s.result}</div></div>)}</div>
        </div>}
        <div className="card"><h3 style={{marginTop:0}}>配下エージェント</h3>
          <div className="agents">
            <div className="a"><b>Back-Office</b><br/>:8092 タスク処理</div>
            <div className="a"><b>Hospital</b><br/>:8094 受付・混雑</div>
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
